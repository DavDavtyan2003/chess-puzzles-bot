name: Daily Chess Puzzle

on:
  schedule:
    - cron: "0 7 * * *"   # 7:00 UTC daily — adjust to your preferred time
  workflow_dispatch: {}    # lets you trigger it manually from GitHub UI for testing

permissions:
  contents: write

jobs:
  send-puzzle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run puzzle bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          NIVEL1_CHAT_ID: ${{ secrets.NIVEL1_CHAT_ID }}
          INTERMEDIATE_CHAT_ID: ${{ secrets.INTERMEDIATE_CHAT_ID }}
          NIVEL3_CHAT_ID: ${{ secrets.NIVEL3_CHAT_ID }}
          NIVEL4_CHAT_ID: ${{ secrets.NIVEL4_CHAT_ID }}
        run: python bot.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update puzzle state"
          git pull --rebase origin main
          git push